<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JMA - Pack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0c0f;
      --surface:    #111318;
      --surface2:   #1a1d24;
      --border:     #252830;
      --accent:     #7eff6a;
      --accent2:    #ff6b35;
      --accent3:    #4db8ff;
      --text:       #e8eaf0;
      --text-muted: #7a7f8e;
      --text-dim:   #4a4f5e;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 56px;
      background: rgba(10,12,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem; letter-spacing: 0.08em;
      text-decoration: none; color: var(--text);
      display: flex; align-items: center; gap: 2px;
    }
    .logo span.bracket { color: var(--accent); }
    nav { display: flex; gap: 2rem; }
    nav a {
      color: var(--text-muted); text-decoration: none;
      font-size: 0.82rem; letter-spacing: 0.06em;
      text-transform: uppercase; transition: color 0.15s;
    }
    nav a:hover { color: var(--accent); }

    /* ── HERO BAND ── */
    .pack-hero {
      position: relative;
      min-height: 340px;
      display: flex; align-items: flex-end;
      overflow: hidden;
    }
    .pack-hero-bg {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #1e3a5f 0%, #0a1628 100%);
      transition: background 0.4s;
    }
    .pack-hero-noise {
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.5;
    }
    .pack-hero-fade {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 30%, var(--bg) 100%);
    }
    .pack-hero-content {
      position: relative; z-index: 2;
      width: 100%; max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 2rem 2.5rem;
      display: flex; gap: 2rem; align-items: flex-end;
    }
    .pack-thumb {
      width: 110px; height: 110px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.1);
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      overflow: hidden;
    }
    .pack-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    .pack-hero-meta { flex: 1; min-width: 0; }
    .pack-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; color: var(--accent);
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .pack-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      line-height: 0.95; letter-spacing: 0.02em;
      color: #fff;
      margin-bottom: 0.6rem;
    }
    .pack-badges {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-bottom: 0.8rem;
    }
    .badge {
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.7rem; font-family: 'Space Mono', monospace;
      letter-spacing: 0.04em;
    }
    .badge-mc  { background: rgba(77,184,255,0.15); color: var(--accent3); border: 1px solid rgba(77,184,255,0.25); }
    .badge-ver { background: rgba(126,255,106,0.1);  color: var(--accent);  border: 1px solid rgba(126,255,106,0.2); }
    .badge-status-active   { background: rgba(126,255,106,0.1); color: var(--accent);  border: 1px solid rgba(126,255,106,0.25); }
    .badge-status-archived { background: rgba(255,107,53,0.1);  color: var(--accent2); border: 1px solid rgba(255,107,53,0.25); }

    /* ── MAIN LAYOUT ── */
    .pack-body {
      max-width: 900px; margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 2rem;
      align-items: start;
    }
    @media (max-width: 680px) {
      .pack-body { grid-template-columns: 1fr; padding: 1.5rem 1rem 3rem; }
      .pack-hero-content { flex-direction: column; align-items: flex-start; }
    }

    /* ── LEFT COLUMN ── */
    .pack-section { margin-bottom: 2rem; }
    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem; color: var(--accent);
      letter-spacing: 0.14em; text-transform: uppercase;
      margin-bottom: 0.75rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }
    .pack-desc {
      font-size: 0.95rem; line-height: 1.7;
      color: var(--text-muted);
    }

    /* Stats row */
    .stats-row {
      display: flex; flex-wrap: wrap; gap: 1px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--border);
    }
    .stat-cell {
      flex: 1; min-width: 80px;
      background: var(--surface);
      padding: 0.9rem 1rem;
    }
    .stat-cell-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem; color: var(--text-dim);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .stat-cell-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 0.04em;
      color: var(--text);
    }
    .stat-cell-value span { color: var(--accent); }

    /* Tags */
    .tags-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tag {
      padding: 0.25rem 0.65rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.72rem; color: var(--text-muted);
      font-family: 'Space Mono', monospace;
    }

    /* Video embed */
    .video-wrap {
      position: relative;
      padding-bottom: 56.25%;
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .video-wrap iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* ── RIGHT COLUMN / DOWNLOAD CARD ── */
    .dl-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: sticky; top: 72px;
    }
    .dl-card-header {
      padding: 1.2rem 1.4rem 0.8rem;
      border-bottom: 1px solid var(--border);
    }
    .dl-card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem; letter-spacing: 0.06em;
      color: var(--text);
    }
    .dl-card-sub {
      font-size: 0.72rem; color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      margin-top: 0.2rem;
    }
    .dl-card-files { padding: 0.6rem 0.8rem; }
    .dl-file {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.65rem 0.6rem;
      border-radius: 7px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s;
      cursor: pointer;
    }
    .dl-file:hover { background: var(--surface2); }
    .dl-file-icon {
      width: 36px; height: 36px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem; font-weight: 800;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .dl-file-info { flex: 1; min-width: 0; }
    .dl-file-name {
      font-size: 0.82rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dl-file-size {
      font-size: 0.68rem; color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      margin-top: 0.15rem;
    }
    .dl-file-arrow {
      color: var(--accent); font-size: 1rem; flex-shrink: 0;
      opacity: 0; transition: opacity 0.15s;
    }
    .dl-file:hover .dl-file-arrow { opacity: 1; }

    .dl-no-files {
      padding: 1.5rem 1.4rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.8rem; font-family: 'Space Mono', monospace;
    }

    .dl-card-footer {
      padding: 0.8rem 1.4rem;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .btn-watch {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.7rem 1rem;
      background: rgba(255,107,53,0.1);
      border: 1px solid rgba(255,107,53,0.3);
      border-radius: 7px;
      color: var(--accent2);
      text-decoration: none;
      font-size: 0.8rem; font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-watch:hover { background: rgba(255,107,53,0.18); border-color: rgba(255,107,53,0.5); }
    .btn-back {
      display: flex; align-items: center; justify-content: center;
      padding: 0.55rem 1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.75rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-back:hover { border-color: var(--text-dim); color: var(--text); }

    /* ── IA NOTICE ── */
    .ia-notice {
      margin-top: 0.6rem;
      padding: 0.6rem 0.8rem;
      background: rgba(77,184,255,0.05);
      border: 1px solid rgba(77,184,255,0.15);
      border-radius: 6px;
      font-size: 0.65rem; color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      line-height: 1.5;
    }
    .ia-notice a { color: var(--accent3); text-decoration: none; }
    .ia-notice a:hover { text-decoration: underline; }

    /* ── BACK BREADCRUMB ── */
    .breadcrumb {
      max-width: 900px; margin: 0 auto;
      padding: 1.2rem 2rem 0;
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.72rem; font-family: 'Space Mono', monospace;
    }
    .breadcrumb a { color: var(--text-dim); text-decoration: none; transition: color 0.15s; }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb-sep { color: var(--text-dim); }
    .breadcrumb-current { color: var(--text-muted); }

    /* ── LOADING ── */
    .loading-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh;
      flex-direction: column; gap: 1rem;
    }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem; color: var(--text-dim);
      letter-spacing: 0.1em;
    }
    .error-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; flex-direction: column; gap: 1rem; text-align: center;
    }
    .error-code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem; color: var(--accent2); opacity: 0.3;
    }
    .error-msg { color: var(--text-muted); font-size: 0.9rem; }

    /* ── FADE IN ── */
    .fade-in { animation: fadeIn 0.35s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    @media (max-width: 480px) {
      header { padding: 0 1rem; }
      nav { display: none; }
      .breadcrumb { padding: 1rem 1rem 0; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <span class="bracket">[</span>
    <span class="name"><span style="font-size:1.15em;">J</span>OSHEMVE <span style="font-size:1.15em;">M</span>ODPACK <span style="font-size:1.15em;">A</span>RCHIVE</span>
    <span class="bracket">]</span>
  </a>
  <nav>
    <a href="index.html">Archive</a>
    <a href="https://www.youtube.com/Joshemve" target="_blank">Videos</a>
    <a href="about.html">About</a>
  </nav>
  <div></div>
</header>

<div id="app"></div>

<script>
  const API = 'https://joshemvemodpackarchive.pythonanywhere.com/api';

  function getPackId() {
    return new URLSearchParams(window.location.search).get('id');
  }

  function youtubeId(url) {
    if (!url) return null;
    const m = url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  function fmtSize(bytes) {
    if (!bytes) return '';
    return bytes > 1024*1024
      ? (bytes/1024/1024).toFixed(1) + ' MB'
      : Math.round(bytes/1024) + ' KB';
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
  }

  function darken(hex) {
    try {
      let r=parseInt(hex.slice(1,3),16);
      let g=parseInt(hex.slice(3,5),16);
      let b=parseInt(hex.slice(5,7),16);
      return `#${Math.floor(r*0.5).toString(16).padStart(2,'0')}${Math.floor(g*0.5).toString(16).padStart(2,'0')}${Math.floor(b*0.5).toString(16).padStart(2,'0')}`;
    } catch { return hex; }
  }

  function renderLoading() {
    document.getElementById('app').innerHTML = `
      <div class="loading-wrap">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading pack…</div>
      </div>`;
  }

  function renderError(msg) {
    document.getElementById('app').innerHTML = `
      <div class="error-wrap">
        <div class="error-code">404</div>
        <div class="error-msg">${msg}</div>
        <a href="index.html" style="margin-top:1rem;color:var(--accent);font-size:0.8rem;text-decoration:none;">← Back to Archive</a>
      </div>`;
  }

  function renderPack(p) {
    document.title = `JMA - ${p.name}`;

    const c0 = p.colors?.[0] || '#1e3a5f';
    const c1 = p.colors?.[1] || '#0a1628';
    const ytId = youtubeId(p.videoUrl);
    const statusClass = p.status === 'active' ? 'badge-status-active' : 'badge-status-archived';
    const statusLabel = p.status === 'active' ? 'Active' : 'Archived';

    const thumbHtml = p.thumb
      ? `<div class="pack-thumb"><img src="${p.thumb}" alt="${p.name}"></div>`
      : `<div class="pack-thumb">📦</div>`;

    const badgesHtml = [
      p.mcVer   ? `<span class="badge badge-mc">MC ${p.mcVer}</span>` : '',
      p.packVer ? `<span class="badge badge-ver">v${p.packVer}</span>` : '',
      `<span class="badge ${statusClass}">${statusLabel}</span>`,
      p.year    ? `<span class="badge badge-mc">${p.year}</span>` : '',
    ].filter(Boolean).join('');

    const statsHtml = `
      <div class="stats-row">
        ${p.mods ? `<div class="stat-cell"><div class="stat-cell-label">Mods</div><div class="stat-cell-value"><span>${p.mods}</span></div></div>` : ''}
        ${p.mcVer ? `<div class="stat-cell"><div class="stat-cell-label">MC Version</div><div class="stat-cell-value">${p.mcVer}</div></div>` : ''}
        ${p.packVer ? `<div class="stat-cell"><div class="stat-cell-label">Pack Ver</div><div class="stat-cell-value">${p.packVer}</div></div>` : ''}
        ${p.year ? `<div class="stat-cell"><div class="stat-cell-label">Year</div><div class="stat-cell-value">${p.year}</div></div>` : ''}
      </div>`;

    const tagsHtml = p.tags?.length
      ? `<div class="pack-section">
          <div class="section-label">Tags</div>
          <div class="tags-list">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>`
      : '';

    const videoHtml = ytId
      ? `<div class="pack-section">
          <div class="section-label">Video</div>
          <div class="video-wrap">
            <iframe src="https://www.youtube.com/embed/${ytId}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
        </div>`
      : '';

    // Download card files
    const extColors = {ZIP:'#ff6b35',MRPACK:'#7eff6a',JAR:'#4db8ff',RAR:'#ff6b35','7Z':'#ff6b35',GZ:'#ff6b35'};
    const filesHtml = p.files?.length
      ? p.files.map(f => {
          const ext   = f.name.split('.').pop().toUpperCase();
          const color = extColors[ext] || '#7a7f8e';
          const base  = f.name.replace(/\.[^.]+$/, '');
          return `<a class="dl-file" href="${f.url}" target="_blank" rel="noopener" title="${f.name}">
            <div class="dl-file-icon" style="background:${color}22;border:1px solid ${color}44;color:${color};">${ext}</div>
            <div class="dl-file-info">
              <div class="dl-file-name">${base}</div>
              <div class="dl-file-size">archive.org ↗</div>
            </div>
            <div class="dl-file-arrow">↓</div>
          </a>`;
        }).join('')
      : `<div class="dl-no-files">// no files yet</div>`;

    const watchBtnHtml = p.videoUrl
      ? `<a class="btn-watch" href="${p.videoUrl}" target="_blank" rel="noopener">
          ▶ Watch on YouTube
        </a>`
      : '';

    const iaNoticeHtml = p.files?.length
      ? `<div class="ia-notice">Files hosted on <a href="https://archive.org" target="_blank">Internet Archive</a>. May take a few minutes after new uploads to become available.</div>`
      : '';

    document.getElementById('app').innerHTML = `
      <div class="fade-in">
        <!-- Hero -->
        <div class="pack-hero">
          <div class="pack-hero-bg" id="heroBg"></div>
          <div class="pack-hero-noise"></div>
          <div class="pack-hero-fade"></div>
          <div class="pack-hero-content">
            ${thumbHtml}
            <div class="pack-hero-meta">
              <div class="pack-eyebrow">// JMA</div>
              <div class="pack-title">${p.name}</div>
              <div class="pack-badges">${badgesHtml}</div>
            </div>
          </div>
        </div>

        <!-- Breadcrumb -->
        <div class="breadcrumb">
          <a href="index.html">Archive</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">${p.name}</span>
        </div>

        <!-- Body -->
        <div class="pack-body">
          <!-- Left -->
          <div>
            ${p.desc ? `
            <div class="pack-section">
              <div class="section-label">About this pack</div>
              <p class="pack-desc">${p.desc}</p>
            </div>` : ''}

            <div class="pack-section">
              <div class="section-label">Details</div>
              ${statsHtml}
            </div>

            ${tagsHtml}
            ${videoHtml}
          </div>

          <!-- Right -->
          <div>
            <div class="dl-card">
              <div class="dl-card-header">
                <div class="dl-card-title">Download</div>
                <div class="dl-card-sub">${p.files?.length ? p.files.length + ' file' + (p.files.length > 1 ? 's' : '') + ' available' : 'No files uploaded yet'}</div>
              </div>
              <div class="dl-card-files">${filesHtml}</div>
              <div class="dl-card-footer">
                ${watchBtnHtml}
                <a class="btn-back" href="index.html">← Back to Archive</a>
                ${iaNoticeHtml}
              </div>
            </div>
          </div>
        </div>
      </div>`;

    // Apply hero gradient from pack colors
    document.getElementById('heroBg').style.background =
      `linear-gradient(135deg, ${c0} 0%, ${darken(c1)} 100%)`;
  }

  async function init() {
    const id = getPackId();
    if (!id) { renderError('No pack ID specified.'); return; }

    renderLoading();

    try {
      const res = await fetch(`${API}/packs/${id}`);
      if (!res.ok) throw new Error('Pack not found');
      const pack = await res.json();
      renderPack(pack);
    } catch (e) {
      renderError('Pack not found or failed to load.');
    }
  }

  init();
</script>
</body>
</html>
